<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TED 精听练习</title>
    <link rel="stylesheet" href="styles.css?v=20260210-3" />
  </head>
  <body>
    <div class="page">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-head">
          <button id="toggleSidebarBtn" class="icon-btn" type="button" aria-label="切换句子列表">☰</button>
          <span class="sidebar-title">句子列表</span>
        </div>
        <div id="sentenceTimeline" class="sentence-timeline"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="mode-switch">
            <button id="sentenceTab" class="mode-btn active" type="button">句子精听</button>
            <button id="fullTab" class="mode-btn" type="button">全文精听</button>
          </div>
          <div class="top-selects">
            <label class="select-pill">
              <select id="repeatSelect">
                <option value="1">播放一次</option>
                <option value="2">播放两次</option>
                <option value="3">播放三次</option>
                <option value="5">播放五次</option>
              </select>
            </label>
            <label class="select-pill">
              <select id="speedSelect">
                <option value="0.75">速度X0.75</option>
                <option value="0.9">速度X0.9</option>
                <option value="1" selected>速度X1.0</option>
                <option value="1.1">速度X1.1</option>
                <option value="1.25">速度X1.25</option>
              </select>
            </label>
          </div>
        </header>

        <section class="media-wrap">
          <video
            id="audio"
            class="media-player"
            preload="metadata"
            playsinline
            webkit-playsinline
            controlslist="nofullscreen nodownload noplaybackrate"
            disablepictureinpicture
          ></video>
        </section>

        <section class="player-row">
          <button id="playPauseBtn" class="play-btn" type="button" aria-label="播放或暂停">▶</button>
          <div class="progress-wrap">
            <input id="progressBar" type="range" min="0" max="1000" value="0" />
          </div>
          <div id="timeDisplay" class="time-display">00:00 / 00:00</div>
        </section>

        <section class="shortcut-row">
          <label class="check-item">
            <input id="showOriginalCheckbox" type="checkbox" />
            显示 / 隐藏原文
          </label>
          <label class="check-item">
            <input id="showTranslationCheckbox" type="checkbox" />
            显示 / 隐藏译文
          </label>
          <span>快捷键：</span>
          <span>“空格” 播放/暂停</span>
          <button id="prevQuickBtn" class="text-btn" type="button">◀ 上一句</button>
          <button id="nextQuickBtn" class="text-btn" type="button">▶ 下一句</button>
          <button id="showOriginalBtn" class="text-btn" type="button">↑ 显示原文</button>
          <button id="showTranslationBtn" class="text-btn" type="button">↓ 显示译文</button>
          <span>“shift” 重播</span>
        </section>

        <section class="practice-wrap">
          <button id="prevSentenceBtn" class="side-arrow left" type="button" aria-label="上一句">‹</button>
          <article class="practice-card">
            <div id="cardHead" class="card-head">
              <span id="sentencePosition">1 / 1</span>
              <button id="favoriteBtn" class="collect-btn" type="button">☆ 收藏本句</button>
            </div>
            <div id="displayBox" class="display-box">
              <div id="sentenceView" class="sentence-view">
                <p id="displayOriginal" class="display-original hidden"></p>
                <p id="displayTranslation" class="display-translation hidden"></p>
              </div>
              <div id="fullView" class="full-view hidden">
                <div id="fullTranscriptList" class="full-transcript-list"></div>
              </div>
            </div>
          </article>
          <button id="nextSentenceBtn" class="side-arrow right" type="button" aria-label="下一句">›</button>
        </section>
      </main>
    </div>

    <script src="bootstrap.js?v=20260210-8"></script>
  </body>
</html>
